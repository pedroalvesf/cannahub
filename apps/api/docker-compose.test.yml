services:
  postgres-test:
    image: postgres:15-alpine
    container_name: auth-postgres-test
    environment:
      POSTGRES_USER: auth_test_user
      POSTGRES_PASSWORD: auth_test_password
      POSTGRES_DB: auth_test_db
    ports:
      - "8239:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_test_user -d auth_test_db"]
      interval: 10s
      timeout: 5s
      retries: 3
