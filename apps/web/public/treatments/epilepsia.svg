<svg xmlns="http://www.w3.org/2000/svg" width="480" height="320" viewBox="0 0 480 320">
  <defs>
    <style>
      .line { stroke: #233A34; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .fill-mint { fill: #A8C8A4; stroke: #233A34; stroke-width: 4; stroke-linejoin: round; }
      .fill-beige { fill: #F3EEDF; }
      .fill-light { fill: #D4E8DA; stroke: #233A34; stroke-width: 4; stroke-linejoin: round; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#F3EEDF" rx="20"/>
  <!-- Brain outline -->
  <ellipse cx="240" cy="140" rx="72" ry="64" class="fill-mint"/>
  <!-- Brain division -->
  <path d="M240 76 L240 204" class="line" stroke-dasharray="6 4"/>
  <!-- Brain folds left -->
  <path d="M200 100 Q180 120 200 140" class="line"/>
  <path d="M192 130 Q175 150 195 170" class="line"/>
  <!-- Brain folds right -->
  <path d="M280 100 Q300 120 280 140" class="line"/>
  <path d="M288 130 Q305 150 285 170" class="line"/>
  <!-- Lightning bolt (seizure → calm) -->
  <path d="M140 90 L155 130 L145 130 L160 170" stroke="#233A34" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Calm wave on right side -->
  <path d="M320 110 Q340 100 350 120 Q360 140 380 130" stroke="#5A9468" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M320 140 Q340 130 350 150 Q360 170 380 160" stroke="#5A9468" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- CBD molecule hint -->
  <circle cx="350" cy="90" r="14" class="fill-light"/>
  <text x="350" y="95" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#233A34" text-anchor="middle">CBD</text>
  <!-- Label -->
  <text x="240" y="260" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#233A34" text-anchor="middle">Epilepsia Refratária</text>
  <text x="240" y="285" font-family="Arial, sans-serif" font-size="13" fill="#607060" text-anchor="middle">Redução de até 50% na frequência de crises</text>
</svg>
