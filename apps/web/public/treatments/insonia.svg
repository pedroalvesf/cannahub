<svg xmlns="http://www.w3.org/2000/svg" width="480" height="320" viewBox="0 0 480 320">
  <defs>
    <style>
      .line { stroke: #233A34; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .fill-mint { fill: #A8C8A4; stroke: #233A34; stroke-width: 4; stroke-linejoin: round; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#F3EEDF" rx="20"/>
  <!-- Moon -->
  <path d="M320 60 Q320 30 340 30 Q325 45 325 65 Q325 85 340 100 Q320 100 320 70Z" fill="#D4E8DA" stroke="#233A34" stroke-width="3"/>
  <!-- Stars -->
  <circle cx="280" cy="50" r="2.5" fill="#5A9468"/>
  <circle cx="365" cy="55" r="2" fill="#5A9468"/>
  <circle cx="350" cy="38" r="1.5" fill="#5A9468" opacity="0.6"/>
  <circle cx="295" cy="35" r="2" fill="#5A9468" opacity="0.5"/>
  <!-- Sleeping figure -->
  <ellipse cx="220" cy="160" rx="90" ry="14" fill="#D4E8DA" stroke="#233A34" stroke-width="3"/>
  <!-- Pillow -->
  <ellipse cx="155" cy="142" rx="30" ry="14" class="fill-mint"/>
  <!-- Head on pillow -->
  <circle cx="165" cy="130" r="22" fill="#F3D8C6" stroke="#233A34" stroke-width="4"/>
  <!-- Closed eyes (sleeping) -->
  <path d="M155 128 Q160 124 165 128" class="line" stroke-width="3"/>
  <path d="M170 128 Q175 124 180 128" class="line" stroke-width="3"/>
  <!-- Peaceful smile -->
  <path d="M160 140 Q165 144 170 140" class="line" stroke-width="2.5"/>
  <!-- Blanket -->
  <path d="M180 148 Q220 140 280 148 Q300 150 310 160 L130 160 Q140 150 180 148Z" class="fill-mint"/>
  <!-- Zzz -->
  <text x="210" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#5A9468" opacity="0.4">z</text>
  <text x="228" y="95" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#5A9468" opacity="0.6">z</text>
  <text x="250" y="76" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#5A9468" opacity="0.8">z</text>
  <!-- Label -->
  <text x="240" y="258" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#233A34" text-anchor="middle">Distúrbios do Sono</text>
  <text x="240" y="283" font-family="Arial, sans-serif" font-size="13" fill="#607060" text-anchor="middle">Alternativa natural aos hipnóticos convencionais</text>
</svg>
