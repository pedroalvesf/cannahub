<svg xmlns="http://www.w3.org/2000/svg" width="480" height="320" viewBox="0 0 480 320">
  <defs>
    <style>
      .line { stroke: #233A34; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .fill-mint { fill: #A8C8A4; stroke: #233A34; stroke-width: 4; stroke-linejoin: round; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#F3EEDF" rx="20"/>
  <!-- Brain with shield (neuroprotection) -->
  <ellipse cx="200" cy="120" rx="55" ry="48" class="fill-mint"/>
  <path d="M200 72 L200 168" class="line" stroke-dasharray="5 4"/>
  <path d="M170 95 Q155 110 170 125" class="line"/>
  <path d="M230 95 Q245 110 230 125" class="line"/>
  <!-- Shield around brain -->
  <path d="M200 60 Q160 70 150 100 Q145 145 200 180 Q255 145 250 100 Q240 70 200 60Z" stroke="#5A9468" stroke-width="3" fill="none" stroke-dasharray="8 4"/>
  <!-- Tremor lines (being calmed) -->
  <path d="M310 90 Q320 85 315 95 Q310 105 320 100" stroke="#C77070" stroke-width="2.5" fill="none" opacity="0.6"/>
  <path d="M330 90 Q340 85 335 95 Q330 105 340 100" stroke="#C77070" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M350 90 Q360 85 355 95 Q350 105 360 100" stroke="#C77070" stroke-width="1.5" fill="none" opacity="0.2"/>
  <!-- Arrow: tremor fading -->
  <path d="M305 100 L365 100" stroke="#5A9468" stroke-width="2" stroke-linecap="round"/>
  <text x="335" y="80" font-family="Arial, sans-serif" font-size="10" fill="#5A9468" text-anchor="middle">controle</text>
  <!-- Hand steady -->
  <path d="M310 140 L320 130 L330 145 L340 125 L350 140" stroke="#233A34" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="330" cy="160" r="12" fill="#D4E8DA" stroke="#5A9468" stroke-width="2"/>
  <text x="330" y="164" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#233A34" text-anchor="middle">CBD</text>
  <!-- Label -->
  <text x="240" y="258" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#233A34" text-anchor="middle">Parkinson</text>
  <text x="240" y="283" font-family="Arial, sans-serif" font-size="13" fill="#607060" text-anchor="middle">Neuroproteção e controle de tremores</text>
</svg>
