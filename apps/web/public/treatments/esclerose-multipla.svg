<svg xmlns="http://www.w3.org/2000/svg" width="480" height="320" viewBox="0 0 480 320">
  <defs>
    <style>
      .line { stroke: #233A34; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .fill-mint { fill: #A8C8A4; stroke: #233A34; stroke-width: 4; stroke-linejoin: round; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#F3EEDF" rx="20"/>
  <!-- Spine/nerve pathway -->
  <line x1="200" y1="60" x2="200" y2="210" stroke="#233A34" stroke-width="5" stroke-linecap="round"/>
  <!-- Nerve branches -->
  <path d="M200 90 L170 75" class="line"/>
  <path d="M200 90 L230 75" class="line"/>
  <path d="M200 130 L165 120" class="line"/>
  <path d="M200 130 L235 120" class="line"/>
  <path d="M200 170 L170 180" class="line"/>
  <path d="M200 170 L230 180" class="line"/>
  <!-- Myelin sheath (healthy = green) -->
  <ellipse cx="200" cy="90" rx="12" ry="8" class="fill-mint"/>
  <ellipse cx="200" cy="130" rx="12" ry="8" class="fill-mint"/>
  <ellipse cx="200" cy="170" rx="12" ry="8" class="fill-mint"/>
  <!-- THC:CBD balance -->
  <circle cx="330" cy="100" r="30" fill="#D4E8DA" stroke="#5A9468" stroke-width="3"/>
  <line x1="330" y1="80" x2="330" y2="120" stroke="#5A9468" stroke-width="2"/>
  <text x="318" y="98" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#233A34">THC</text>
  <text x="318" y="113" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#5A9468">CBD</text>
  <!-- Balance scale -->
  <line x1="305" y1="150" x2="355" y2="150" stroke="#233A34" stroke-width="3" stroke-linecap="round"/>
  <line x1="330" y1="135" x2="330" y2="150" stroke="#233A34" stroke-width="3"/>
  <path d="M305 150 L300 165 L315 165Z" fill="#D4E8DA" stroke="#233A34" stroke-width="2"/>
  <path d="M355 150 L350 165 L365 165Z" fill="#A8C8A4" stroke="#233A34" stroke-width="2"/>
  <text x="307" y="180" font-family="Arial, sans-serif" font-size="9" fill="#607060" text-anchor="middle">1:1</text>
  <!-- Label -->
  <text x="240" y="258" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#233A34" text-anchor="middle">Esclerose Múltipla</text>
  <text x="240" y="283" font-family="Arial, sans-serif" font-size="13" fill="#607060" text-anchor="middle">THC:CBD 1:1 para espasticidade</text>
</svg>
